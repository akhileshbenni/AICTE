<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Certificate - AICTE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .verify-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            background-color: var(--bg-color);
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            padding: 2rem;
        }

        .verify-card {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
        }

        .search-box {
            display: flex;
            margin-top: 2rem;
            gap: 1rem;
        }

        .search-box input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            font-size: 1.1rem;
            outline: none;
            text-transform: uppercase;
        }

        .search-box input::placeholder {
            text-transform: none;
        }

        .search-box button {
            padding: 1rem 2rem;
            border-radius: 8px;
            background: var(--accent-color);
            color: white;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-box button:hover {
            background: var(--accent-hover);
        }

        .result-box {
            margin-top: 2rem;
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 1.5rem;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-item {
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 0.5rem;
        }

        .result-item:last-child {
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
        }

        .result-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .result-value {
            color: white;
            font-weight: 500;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .error-message {
            color: #f87171;
            margin-top: 1rem;
            font-size: 0.95rem;
            display: none;
        }
        
        .header-links {
            margin-top: 2rem;
            font-size: 0.9rem;
        }
        
        .header-links a {
            color: var(--accent-color);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="verify-container">
        <div class="verify-card">
            <div class="panel-header" style="margin-bottom: 1rem;">
                <h2>Certificate Verification</h2>
                <p>Enter the Certificate ID to verify its authenticity.</p>
            </div>

            <div class="search-box">
                <input type="text" id="certIdInput" placeholder="e.g. GECR-AICTE-X7B4F9" autocomplete="off">
                <button id="verifyBtn">Verify</button>
            </div>

            <p class="error-message" id="errorMessage">Certificate not found. Please check the ID.</p>

            <div class="result-box" id="resultBox">
                <div style="text-align: center;">
                    <span class="status-badge">✓ VALID CERTIFICATE</span>
                </div>
                
                <div class="result-item">
                    <span class="result-label">Student Name</span>
                    <span class="result-value" id="resName"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">USN</span>
                    <span class="result-value" id="resUsn"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">Course</span>
                    <span class="result-value" id="resCourse"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">Activity Name</span>
                    <span class="result-value" id="resActivity"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">Activity Details</span>
                    <span class="result-value" id="resDetails"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">Duration</span>
                    <span class="result-value" id="resDuration"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">Total Hours</span>
                    <span class="result-value" id="resHours"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">Points Earned</span>
                    <span class="result-value" id="resPoints"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">Event Date</span>
                    <span class="result-value" id="resDate"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">Generated On</span>
                    <span class="result-value" id="resTimestamp"></span>
                </div>
            </div>
            
            <div class="header-links">
                <a href="index.html">&larr; Back to Generator</a>
            </div>
        </div>
    </div>

    <script src="verify.js"></script>
</body>
</html>
